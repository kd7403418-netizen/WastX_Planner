name: Build WastX APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⚙️ Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔎 Debug list repo root
        run: ls -la

      - name: 🔍 Verify gradlew and wrapper files
        run: |
          if [ ! -f ./gradlew ]; then
            echo "::error::gradlew not found! Please commit the gradlew script to the repository."
            exit 1
          fi
          if [ ! -f ./gradle/wrapper/gradle-wrapper.jar ]; then
            echo "::error::gradle-wrapper.jar not found! Please commit gradle/wrapper/gradle-wrapper.jar and gradle/wrapper/gradle-wrapper.properties."
            exit 1
          fi

      - name: 📋 Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: 🔧 Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WastX-Planner-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: ✅ Done
        run: echo "✅ APK ready! Download from Artifacts section above."
