name: Build WastX APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📥 Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.0.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Gradle wrapper jar downloaded"
          ls -lh gradle/wrapper/

      - name: 📋 Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: 🔧 Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WastX-Planner-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: ✅ Done
        run: echo "✅ APK ready! Download from Artifacts section above."
